<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;
    --bg:#070B14;--bg2:#0D1526;--accent:#00D4FF;--accent2:#7B2FBE;
    --green:#00FF88;--red:#FF3B5C;--text:#E8F0FF;--muted:#5A6A8A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  #particles{position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(0,212,255,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(123,47,190,.10) 0%,transparent 60%),var(--bg);}
  #particles::after{content:'';position:absolute;inset:0;
    background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,.20) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 20%,rgba(255,255,255,.30) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 60%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 10%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 80%,rgba(0,212,255,.40) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 70%,rgba(123,47,190,.50) 0%,transparent 100%);
    animation:twinkle 4s ease-in-out infinite alternate;}
  @keyframes twinkle{from{opacity:.6}to{opacity:1}}
  .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 80px;}
  header{text-align:center;padding:48px 0 36px;}
  .header-badge{display:inline-flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(123,47,190,.12));
    border:1px solid rgba(0,212,255,.25);border-radius:50px;padding:8px 22px;
    font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;}
  h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2.4rem,6vw,4rem);font-weight:700;line-height:1;
    background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:1px;text-transform:uppercase;}
  .subtitle{color:var(--muted);font-size:.9rem;margin-top:8px;letter-spacing:1px;}
  .period-bar{display:flex;justify-content:center;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
  .period-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--muted);
    padding:8px 22px;border-radius:50px;font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:600;
    letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
  .period-btn:hover{border-color:rgba(0,212,255,.4);color:var(--accent);}
  .period-btn.active{background:linear-gradient(135deg,rgba(0,212,255,.18),rgba(123,47,190,.18));border-color:var(--accent);color:#fff;}
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:36px;}
  .stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;text-align:center;}
  .stat-value{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent);line-height:1;}
  .stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
  .podium-section{display:flex;justify-content:center;align-items:flex-end;gap:16px;margin-bottom:48px;padding:0 10px;}
  .podium-card{display:flex;flex-direction:column;align-items:center;position:relative;animation:riseUp .6s ease both;}
  .podium-card:nth-child(1){animation-delay:.2s}.podium-card:nth-child(2){animation-delay:0s}.podium-card:nth-child(3){animation-delay:.4s}
  @keyframes riseUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  .podium-avatar-wrap{position:relative;margin-bottom:10px;}
  .podium-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;font-weight:900;color:#fff;background:linear-gradient(135deg,#1a2540,#2a3560);
    position:relative;z-index:1;border:3px solid transparent;font-family:'Rajdhani',sans-serif;overflow:hidden;}
  .podium-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .rank-1 .podium-avatar{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.5);width:88px;height:88px;font-size:2rem;}
  .rank-2 .podium-avatar{border-color:var(--silver);box-shadow:0 0 14px rgba(192,192,192,.4);}
  .rank-3 .podium-avatar{border-color:var(--bronze);box-shadow:0 0 14px rgba(205,127,50,.4);}
  .podium-crown{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:1.3rem;animation:float 2.5s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
  .podium-badge{position:absolute;bottom:-4px;right:-4px;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;z-index:2;font-family:'Rajdhani',sans-serif;}
  .rank-1 .podium-badge{background:var(--gold);color:#000;width:30px;height:30px;}
  .rank-2 .podium-badge{background:var(--silver);color:#000;}
  .rank-3 .podium-badge{background:var(--bronze);color:#000;}
  .podium-name{font-size:.88rem;font-weight:700;text-align:center;max-width:90px;line-height:1.2;margin-bottom:6px;}
  .rank-1 .podium-name{font-size:1rem;max-width:110px;}
  .podium-platform{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;
    font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;width:80px;color:rgba(255,255,255,.15);}
  .rank-1 .podium-platform{background:linear-gradient(180deg,rgba(255,215,0,.18),rgba(255,215,0,.05));height:64px;width:100px;font-size:2rem;border:1px solid rgba(255,215,0,.25);border-bottom:none;}
  .rank-2 .podium-platform{background:linear-gradient(180deg,rgba(192,192,192,.12),rgba(192,192,192,.03));height:46px;border:1px solid rgba(192,192,192,.18);border-bottom:none;}
  .rank-3 .podium-platform{background:linear-gradient(180deg,rgba(205,127,50,.12),rgba(205,127,50,.03));height:32px;border:1px solid rgba(205,127,50,.15);border-bottom:none;}
  .section-title{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:2px;
    text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}
  .ranking-list{display:flex;flex-direction:column;gap:8px;}
  .rank-item{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 20px;
    transition:all .25s;animation:fadeSlide .4s ease both;}
  @keyframes fadeSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  .rank-item:hover{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.2);transform:translateX(4px);}
  .rank-num{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--muted);min-width:28px;text-align:center;}
  .rank-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a2540,#2a3560);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;
    font-family:'Rajdhani',sans-serif;flex-shrink:0;border:2px solid rgba(255,255,255,.06);color:#fff;overflow:hidden;}
  .rank-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .rank-info{flex:1;min-width:0;}
  .rank-name{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-meta{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .rank-bar-wrap{flex:1;max-width:180px;display:flex;flex-direction:column;gap:4px;}
  .rank-bar-bg{height:6px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;}
  .rank-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .8s cubic-bezier(.4,0,.2,1);}
  .rank-bar-pct{font-size:.72rem;color:var(--muted);text-align:right;}
  .rank-trend{font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:3px;min-width:44px;justify-content:flex-end;}
  .rank-trend.up{color:var(--green)}.rank-trend.down{color:var(--red)}.rank-trend.same{color:var(--muted)}
  .admin-toggle{position:fixed;bottom:28px;right:28px;
    background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:50%;
    width:58px;height:58px;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 24px rgba(0,212,255,.35);
    z-index:100;transition:transform .2s;}
  .admin-toggle:hover{transform:scale(1.1) rotate(15deg);}
  .admin-panel{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center;
    background:rgba(0,0,0,.7);backdrop-filter:blur(6px);}
  .admin-panel.open{display:flex;}
  .admin-sheet{background:#0D1526;border:1px solid rgba(0,212,255,.2);border-radius:24px 24px 0 0;
    width:100%;max-width:700px;padding:28px 24px 40px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .admin-title{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;}
  .close-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);
    width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .close-btn:hover{background:rgba(255,60,60,.2);}
  .admin-section{margin-bottom:24px;}
  .admin-section-title{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:600;}
  .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .form-input{flex:1;min-width:120px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
    border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
  .form-input:focus{border-color:var(--accent);}
  .form-input::placeholder{color:var(--muted);}
  .btn{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:10px;color:#fff;
    padding:10px 20px;font-family:'Exo 2',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.5px;}
  .btn:hover{opacity:.85}.btn:active{transform:scale(.97)}
  .btn-sm{padding:7px 14px;font-size:.78rem;}
  .btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);}
  .btn-secondary{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);}
  .member-list-admin{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;}
  .member-admin-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 14px;}
  .admin-avatar{width:42px;height:42px;border-radius:50%;overflow:hidden;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.1);cursor:pointer;
    position:relative;transition:border-color .2s;}
  .admin-avatar:hover{border-color:var(--accent);}
  .admin-avatar img{width:100%;height:100%;object-fit:cover;}
  .upload-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;
    justify-content:center;opacity:0;transition:opacity .2s;font-size:.75rem;border-radius:50%;}
  .admin-avatar:hover .upload-overlay{opacity:1;}
  .member-admin-name{flex:1;font-size:.88rem;font-weight:600;}
  .member-admin-rank{font-family:'Rajdhani',sans-serif;font-size:.85rem;color:var(--muted);min-width:30px;}
  .pts-input{width:80px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
    border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.82rem;text-align:center;outline:none;}
  .pts-input:focus{border-color:var(--accent);}
  .save-all-btn{width:100%;padding:14px;font-size:1rem;border-radius:12px;margin-top:10px;letter-spacing:1px;}
  #password-screen{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
  #password-screen.show{display:flex;}
  .pw-title{font-family:'Rajdhani',sans-serif;font-size:1.5rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;}
  .pw-input{background:rgba(255,255,255,.06);border:1px solid rgba(0,212,255,.3);border-radius:12px;
    padding:12px 20px;color:#fff;font-size:1rem;font-family:'Exo 2',sans-serif;outline:none;text-align:center;letter-spacing:4px;width:200px;}
  .pw-error{color:var(--red);font-size:.85rem;display:none;}
  .pw-error.show{display:block;}
  #file-input{display:none;}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.25);border-radius:10px}
  @media(max-width:500px){.rank-bar-wrap{display:none}.stats-bar{gap:8px}.stat-value{font-size:1.4rem}}
</style>
</head>
<body>
<div id="particles"></div>
<input type="file" id="file-input" accept="image/*" />

<div id="password-screen">
  <div class="pw-title">🔐 Acesso Admin</div>
  <input type="password" id="pw-input" class="pw-input" placeholder="••••" maxlength="20"/>
  <button class="btn" onclick="checkPassword()">Entrar</button>
  <p class="pw-error" id="pw-error">Senha incorreta</p>
  <button class="btn btn-secondary btn-sm" onclick="closePwScreen()">Cancelar</button>
</div>

<div class="app">
  <header>
    <div class="header-badge"><span>🏆</span> Temporada 2025</div>
    <h1>Ranking de Vendas</h1>
    <p class="subtitle" id="subtitle-period">Mês atual · Atualizado agora</p>
  </header>
  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod(this,'Semana')">Semana</button>
    <button class="period-btn" onclick="setPeriod(this,'Mês')">Mês</button>
    <button class="period-btn" onclick="setPeriod(this,'Trimestre')">Trimestre</button>
    <button class="period-btn" onclick="setPeriod(this,'Ano')">Ano</button>
  </div>
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Vendedores</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-leader">—</div><div class="stat-label">Líder</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-avg">—</div><div class="stat-label">Média pts</div></div>
  </div>
  <div class="podium-section" id="podium"></div>
  <div class="section-title">Classificação Geral</div>
  <div class="ranking-list" id="ranking-list"></div>
</div>

<button class="admin-toggle" onclick="openAdmin()" title="Painel Admin">⚙️</button>

<div class="admin-panel" id="admin-panel" onclick="closeAdminOutside(event)">
  <div class="admin-sheet">
    <div class="admin-header">
      <div class="admin-title">⚙️ Painel Admin</div>
      <button class="close-btn" onclick="closeAdmin()">✕</button>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">Adicionar Membro</div>
      <div class="form-row">
        <input type="text" id="new-name" class="form-input" placeholder="Nome completo" maxlength="28"/>
        <input type="number" id="new-pts" class="form-input" placeholder="Pontos" min="0" style="max-width:130px"/>
        <button class="btn" onclick="addMember()">+ Adicionar</button>
      </div>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">Membros · Toque na foto para trocar 📷</div>
      <div class="member-list-admin" id="admin-member-list"></div>
      <button class="btn save-all-btn" onclick="saveAllScores()">💾 Salvar Ranking</button>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">⚠️ Zona de Risco</div>
      <div class="form-row">
        <button class="btn btn-danger btn-sm" onclick="resetAllScores()">Zerar Pontuação</button>
        <button class="btn btn-danger btn-sm" onclick="clearAllMembers()">Limpar Tudo</button>
      </div>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = '1234';
let members = JSON.parse(localStorage.getItem('rv_members3') || 'null') || [
  {name:'Ana Lima',pts:980,prev:2,photo:''},
  {name:'Carlos Mota',pts:940,prev:1,photo:''},
  {name:'Fernanda Cruz',pts:890,prev:3,photo:''},
  {name:'Rafael Souza',pts:830,prev:5,photo:''},
  {name:'Juliana Rocha',pts:800,prev:4,photo:''},
  {name:'Marcos Alves',pts:760,prev:7,photo:''},
  {name:'Patrícia Neves',pts:720,prev:6,photo:''},
  {name:'Diego Santos',pts:680,prev:9,photo:''},
  {name:'Aline Ferreira',pts:640,prev:8,photo:''},
  {name:'Bruno Costa',pts:590,prev:10,photo:''},
  {name:'Camila Torres',pts:540,prev:12,photo:''},
  {name:'Eduardo Lima',pts:500,prev:11,photo:''},
];

function save(){localStorage.setItem('rv_members3',JSON.stringify(members));}
function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
const COLORS=[['#1a3a5c','#00D4FF'],['#3a1a5c','#7B2FBE'],['#1a5c3a','#00FF88'],['#5c3a1a','#FFA500'],['#5c1a1a','#FF3B5C'],['#1a4a5c','#00cfff'],['#4a5c1a','#c8ff00'],['#5c4a1a','#ffcc00'],['#1a5c4a','#00ffd0'],['#3a5c1a','#88ff00'],['#5c1a4a','#ff00cc'],['#1a1a5c','#8888ff']];
function bgStyle(i){const[bg,fg]=COLORS[i%COLORS.length];return`background:linear-gradient(135deg,${bg},${fg}33);color:${fg};`;}
function avatarInner(m,i,big){
  if(m.photo) return `<img src="${m.photo}" alt="${m.name}"/>`;
  return `<span style="${bgStyle(i)}width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:'Rajdhani',sans-serif;font-weight:800;font-size:${big?'1.8rem':'.9rem'}">${initials(m.name)}</span>`;
}

// photo upload
let pendingIdx=null;
const fileInput=document.getElementById('file-input');
fileInput.addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file||pendingIdx===null)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const sz=200; canvas.width=sz; canvas.height=sz;
      const ctx=canvas.getContext('2d');
      const min=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,sz,sz);
      members[pendingIdx].photo=canvas.toDataURL('image/jpeg',.75);
      save(); render(); renderAdminList(); pendingIdx=null;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value='';
});
function triggerPhoto(idx){pendingIdx=idx;fileInput.click();}

function getSorted(){return[...members].sort((a,b)=>b.pts-a.pts);}

function render(){
  const sorted=getSorted(); const maxPts=sorted[0]?.pts||1; save();
  document.getElementById('stat-total').textContent=sorted.length;
  document.getElementById('stat-leader').textContent=sorted[0]?sorted[0].name.split(' ')[0]:'—';
  const avg=sorted.length?Math.round(sorted.reduce((a,b)=>a+b.pts,0)/sorted.length):0;
  document.getElementById('stat-avg').textContent=avg;

  const top3=sorted.slice(0,3);
  const order=[top3[1],top3[0],top3[2]].filter(Boolean);
  const classMap=['rank-2','rank-1','rank-3']; const realRank=[2,1,3];
  document.getElementById('podium').innerHTML=order.map((m,idx)=>{
    const mi=members.indexOf(m); const rk=realRank[idx];
    const ht=rk===1?64:rk===2?46:32; const medal=rk===1?'👑':rk===2?'🥈':'🥉';
    return`<div class="podium-card ${classMap[idx]}">
      <div class="podium-avatar-wrap">
        ${rk===1?'<div class="podium-crown">👑</div>':''}
        <div class="podium-avatar">${avatarInner(m,mi,true)}</div>
        <div class="podium-badge">${rk}</div>
      </div>
      <div class="podium-name">${m.name.split(' ')[0]}<br><span style="color:var(--muted);font-size:.75rem;font-weight:400">${m.name.split(' ').slice(1).join(' ')}</span></div>
      <div class="podium-platform" style="height:${ht}px">${medal}</div>
    </div>`;
  }).join('');

  document.getElementById('ranking-list').innerHTML=sorted.slice(3).map((m,idx)=>{
    const rank=idx+4; const mi=members.indexOf(m);
    const pct=Math.round((m.pts/maxPts)*100);
    const d=(m.prev||rank)-rank;
    const tc=d>0?'up':d<0?'down':'same';
    const ti=d>0?`▲ ${d}`:d<0?`▼ ${Math.abs(d)}`:`—`;
    return`<div class="rank-item" style="--i:${idx}">
      <div class="rank-num">${rank}</div>
      <div class="rank-avatar">${avatarInner(m,mi,false)}</div>
      <div class="rank-info"><div class="rank-name">${m.name}</div><div class="rank-meta">Posição #${rank}</div></div>
      <div class="rank-bar-wrap"><div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div><div class="rank-bar-pct">${pct}%</div></div>
      <div class="rank-trend ${tc}">${ti}</div>
    </div>`;
  }).join('');
}

function setPeriod(btn,label){
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('subtitle-period').textContent=label+' atual · Atualizado agora';
}

let adminUnlocked=false;
function openAdmin(){
  if(!adminUnlocked){document.getElementById('password-screen').classList.add('show');setTimeout(()=>document.getElementById('pw-input').focus(),100);}
  else showAdminPanel();
}
function checkPassword(){
  if(document.getElementById('pw-input').value===ADMIN_PASSWORD){
    adminUnlocked=true;document.getElementById('password-screen').classList.remove('show');
    document.getElementById('pw-input').value='';showAdminPanel();
  }else{document.getElementById('pw-error').classList.add('show');document.getElementById('pw-input').value='';}
}
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});
function closePwScreen(){document.getElementById('password-screen').classList.remove('show');document.getElementById('pw-input').value='';document.getElementById('pw-error').classList.remove('show');}
function showAdminPanel(){renderAdminList();document.getElementById('admin-panel').classList.add('open');}
function closeAdmin(){document.getElementById('admin-panel').classList.remove('open');}
function closeAdminOutside(e){if(e.target===document.getElementById('admin-panel'))closeAdmin();}

function renderAdminList(){
  const sorted=getSorted();
  document.getElementById('admin-member-list').innerHTML=sorted.map((m,idx)=>{
    const mi=members.indexOf(m);
    return`<div class="member-admin-row">
      <div class="member-admin-rank">#${idx+1}</div>
      <div class="admin-avatar" onclick="triggerPhoto(${mi})" title="Trocar foto" style="${m.photo?'':bgStyle(mi)}">
        ${m.photo?`<img src="${m.photo}"/>`:`<span style="font-family:'Rajdhani',sans-serif;font-weight:800;font-size:.85rem">${initials(m.name)}</span>`}
        <div class="upload-overlay">📷</div>
      </div>
      <div class="member-admin-name">${m.name}</div>
      <input type="number" class="pts-input" data-idx="${mi}" value="${m.pts}" min="0"/>
      <button class="btn btn-danger btn-sm" onclick="removeMember(${mi})">✕</button>
    </div>`;
  }).join('');
}

function addMember(){
  const name=document.getElementById('new-name').value.trim();
  const pts=parseInt(document.getElementById('new-pts').value)||0;
  if(!name)return;
  members.push({name,pts,prev:members.length+1,photo:''});
  document.getElementById('new-name').value='';document.getElementById('new-pts').value='';
  render();renderAdminList();
}
function removeMember(idx){if(!confirm('Remover '+members[idx].name+'?'))return;members.splice(idx,1);render();renderAdminList();}
function saveAllScores(){
  document.querySelectorAll('.pts-input').forEach(input=>{
    const idx=parseInt(input.dataset.idx);
    members[idx].prev=getSorted().findIndex(m=>m===members[idx])+1;
    members[idx].pts=parseInt(input.value)||0;
  });
  render();renderAdminList();closeAdmin();
  document.querySelectorAll('.rank-item').forEach(el=>{el.style.background='rgba(0,212,255,.12)';setTimeout(()=>el.style.background='',600);});
}
function resetAllScores(){if(!confirm('Zerar TODOS os pontos?'))return;members.forEach(m=>{m.prev=getSorted().findIndex(x=>x===m)+1;m.pts=0;});render();renderAdminList();}
function clearAllMembers(){if(!confirm('Apagar TODOS os membros?'))return;members=[];render();renderAdminList();}
render();
</script>

</body>
</html>
